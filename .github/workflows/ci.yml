name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter backend run prisma:generate
      - run: pnpm --filter backend run lint
      - run: pnpm --filter backend test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      # Monorepo: lockfile lives at repo root (same as backend job).
      - run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: pnpm --filter frontend run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          INTERNAL_API_URL: http://localhost:4000/api/v1
          JWT_SECRET: ci-jwt-secret-for-next-build-only
