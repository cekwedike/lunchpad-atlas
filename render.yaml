# Build from repo root: Dockerfile expects COPY backend/ and COPY shared/
services:
  - type: web
    name: atlas-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false  # Neon pooled connection URL (used by app at runtime)
      - key: DIRECT_URL
        sync: false  # Neon direct (non-pooled) connection URL (used by prisma migrate)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Applied by Nest JwtModule and refresh-token signing (see backend auth.module / auth.service)
      - key: JWT_EXPIRATION
        value: "15m"
      - key: JWT_REFRESH_EXPIRATION
        value: "90d"
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel URL after deploying frontend
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: EMAIL_NOTIFICATIONS_ENABLED
        value: "true"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false  # Your Gmail address (requires App Password, not regular password)
      - key: EMAIL_PASSWORD
        sync: false  # Gmail App Password (myaccount.google.com/apppasswords)
      - key: EMAIL_FROM
        value: "ATLAS Platform <noreply@atlas.com>"
      - key: RESEND_API_KEY
        sync: false  # Get from resend.com dashboard — required for email delivery on Render
      - key: VAPID_PUBLIC_KEY
        sync: false  # Generate with: npx web-push generate-vapid-keys
      - key: VAPID_PRIVATE_KEY
        sync: false  # Same command as above
      - key: VAPID_SUBJECT
        value: "mailto:admin@thrivehubafrica.com"
